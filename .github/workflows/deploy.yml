name: Deploy to VPS

on:
  push:
    branches:
      - main  # hoặc master, tùy branch chính của bạn

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/tubeoperator  # đổi thành path thực trên VPS
            git pull origin main
            npm ci
            npm run build
            # Nếu dùng PM2 hoặc nginx reload:
            # pm2 restart tubeoperator
